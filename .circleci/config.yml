# Python CircleCI 2.0 configuration file

version: 2.1
references:
  container_python312: &container_python312
    docker:
      - image: cimg/python:3.12.11
      - name: localstack
        image: localstack/localstack
    working_directory: ~/repo

  restore_repo: &restore_repo
    restore_cache:
      keys:
        - v0-repo-{{ .Branch }}-{{ .Revision }}
        - v0-repo-{{ .Branch }}
        - v0-repo

  save_repo: &save_repo
    save_cache:
      key: v0-repo-{{ .Branch }}-{{ .Revision }}
      paths:
        - ~/repo
  save_dependencies312: &save_dependencies312
    save_cache:
      paths:
        - ~/venv312
      key: v0-dependencies312-{{ checksum "requirements.txt"}}-{{ checksum "requirements-dev.txt" }}

  restore_dependencies312: &restore_dependencies312
    restore_cache:
      keys:
        - v0-dependencies312-{{ checksum "requirements.txt" }}-{{ checksum "requirements-dev.txt" }}
        - v0-dependencies312-

jobs:
  install_and_test_312:
    <<: *container_python312
    steps:
      - checkout
      - *save_repo
      - run:
          name: Install virtualenv
          command: pip install --user --upgrade virtualenv
      - run:
          name: Install dependencies
          command: |
            virtualenv ~/venv312
            . ~/venv312/bin/activate
            pip install -r requirements.txt
            pip install -r requirements-dev.txt
      - *save_dependencies312
      - run :
          name: Run tests
          environment:
            LOCALSTACK_HOST: localstack
          command: |
            . ~/venv312/bin/activate
            nose2 -v --with-coverage cumulus_process

  deploy:
    <<: *container_python312
    steps:
      - checkout
      - *restore_repo
      - *restore_dependencies312
      - run:
          name: Push tag to github
          command: |
            GITHUB_TOKEN=${GITHUB_TOKEN} sh bin/release.sh
      - run:
          name: Deploy to PyPi
          command: |
            . ~/venv312/bin/activate
            pip install twine setuptools
            python setup.py sdist
            twine upload --skip-existing --username "${PYPI_USER}" --password "${PYPI_PASS}" dist/*

workflows:
  version: 2
  build_test_312_deploy:
    jobs:
      - install_and_test_312
      - deploy:
          requires:
            - install_and_test_312
          filters:
            branches:
              only: master
